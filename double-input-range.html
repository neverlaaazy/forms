<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>double-input-range</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/d-range.js"></script>
</head>
<body>
    <div class="container">
        <div class="pages-menu">
            <a href="custom-select.html">Перейти к след. заданию→</a><br>
            <a href="input-range.html">←Перейти к предыдущему</a>
        </div><br>
        <div class="filter__section">
            <h3>Срок поставки</h3>
            <div class="filter-delivery">
                <div class="filter-delivery__container">
                    <div class="filter-delivery__slider">
                        <div class="filter-delivery__progress"></div>
                    </div>
                    <input type="range" class="filter-delivery__range min" min="0" max="10" value="0" tabindex="0">
                    <input type="range" class="filter-delivery__range" min="0" max="10" value="10" tabindex="0">
                </div>
                <div class="filter-delivery__values">
                    <div class="filter-delivery__min">от <span>0</span> дней</div>
                    <div class="filter-delivery__max">до <span>10</span> дней</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
